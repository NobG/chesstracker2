services:
  chesstracker2-db:
    image: postgres:16-alpine
    container_name: chesstracker2-db
    restart: unless-stopped
    network_mode: host
    command: ["postgres", "-p", "15432", "-c", "listen_addresses=127.0.0.1"]
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-chesstracker2}
      POSTGRES_USER: ${POSTGRES_USER:-chesstracker2}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - chesstracker2_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 15432 -U ${POSTGRES_USER:-chesstracker2} -d ${POSTGRES_DB:-chesstracker2}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  chesstracker2-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chesstracker2-app
    restart: unless-stopped
    network_mode: host
    depends_on:
      chesstracker2-db:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      SPRING_DATASOURCE_URL: jdbc:postgresql://127.0.0.1:15432/${POSTGRES_DB:-chesstracker2}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-chesstracker2}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      SERVER_PORT: ${APP_PORT:-8080}
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:${APP_PORT:-8080}/today || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s

volumes:
  chesstracker2_pgdata:
