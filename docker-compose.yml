services:
  postgres:
    image: postgres:16-alpine
    container_name: chesstracker-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: chesstracker
      POSTGRES_USER: chesstracker
      POSTGRES_PASSWORD: chesstracker_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
