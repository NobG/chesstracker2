services:
  chesstracker2-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chesstracker2-app
    restart: unless-stopped
    depends_on:
      chesstracker2-db:
        condition: service_healthy
    environment:
      TZ: Europe/Berlin
      JAVA_TOOL_OPTIONS: "-Duser.timezone=Europe/Berlin"
      SERVER_PORT: 8080
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:postgresql://chesstracker2-db:5432/chesstracker2}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-chesstracker2}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:?Set SPRING_DATASOURCE_PASSWORD in .env}
      CHESSTRACKER2_AUTH_USER: ${CHESSTRACKER2_AUTH_USER:?CHESSTRACKER2_AUTH_USER must be set}
      CHESSTRACKER2_AUTH_PASSWORD: ${CHESSTRACKER2_AUTH_PASSWORD:?CHESSTRACKER2_AUTH_PASSWORD must be set}
    ports:
      - "127.0.0.1:${APP_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/login >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s

  chesstracker2-db:
    image: postgres:16-alpine
    container_name: chesstracker2-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-chesstracker2}
      POSTGRES_USER: ${POSTGRES_USER:-chesstracker2}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - chesstracker2_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-chesstracker2} -d ${POSTGRES_DB:-chesstracker2}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  chesstracker2_pgdata:
