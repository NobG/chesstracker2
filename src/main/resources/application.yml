server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: chesstracker
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/chesstracker}
    username: ${SPRING_DATASOURCE_USERNAME:chesstracker}
    password: ${SPRING_DATASOURCE_PASSWORD:chesstracker_dev}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true

---
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/chesstracker}
    username: ${SPRING_DATASOURCE_USERNAME:chesstracker}
    password: ${SPRING_DATASOURCE_PASSWORD:chesstracker_dev}
  thymeleaf:
    cache: false

---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
  thymeleaf:
    cache: true
