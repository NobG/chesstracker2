<!doctype html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head(${pageTitle})}"></head>
<body>
<header th:replace="~{fragments :: topnav}"></header>
<main class="shell">
    <section class="page-heading">
        <p class="eyebrow">Kategorie-Statistik</p>
        <h1>Kategorien</h1>
        <p>Langfristige Sicht auf Durchschnitt, Einheiten, beste und schwaechste Tage.</p>
    </section>
    <section class="entry-grid">
        <article class="entry-card" th:each="category : ${categories}">
            <div class="entry-card__head">
                <div>
                    <h2 th:text="${category.categoryName()}">Tactics</h2>
                    <p th:text="'Trend: ' + ${category.trend()}">Trend</p>
                </div>
                <strong class="rate-pill" th:text="${category.successRate() == null ? '-' : category.successRate() + '%'}">-</strong>
            </div>
            <div class="insight-list">
                <p><span>Einheiten</span><strong th:text="${category.trainingUnits()}">0</strong></p>
                <p><span>Aufgaben</span><strong th:text="${category.successCount()} + '/' + ${category.totalCount()}">0/0</strong></p>
                <p><span>Letzter Eintrag</span><strong th:text="${category.lastEntryDate() == null ? '-' : category.lastEntryDate()}">-</strong></p>
                <p><span>Bester Tag</span><strong th:text="${category.bestDay() == null ? '-' : category.bestDay() + ' (' + category.bestDayRate() + '%)'}">-</strong></p>
                <p><span>Schwaechster Tag</span><strong th:text="${category.worstDay() == null ? '-' : category.worstDay() + ' (' + category.worstDayRate() + '%)'}">-</strong></p>
            </div>
        </article>
    </section>
</main>
</body>
</html>
